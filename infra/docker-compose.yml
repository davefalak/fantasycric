version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: fantasy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fantasy_ipl_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: fantasy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
volumes:
  pgdata:
